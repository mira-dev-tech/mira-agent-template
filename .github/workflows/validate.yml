name: validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      # Validação offline da config (schema, modelo, ranges). Não chama a API nem usa secrets.
      - run: node bin/mira.mjs validate
